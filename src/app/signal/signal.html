<div class="px-25 py-20">
  <h1 class="mt-4 mb-5 text-center font-bold text-3xl">Signals: reactividad</h1>

  <div class="w-full max-w-2xl bg-white rounded-lg shadow-md p-6">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-semibold text-gray-800">Carrito de Tienda</h1>
      <div class="flex items-center gap-4">
        <div class="text-sm text-gray-600">
          <div class="text-xs text-gray-500">Cantidad</div>
          <div id="cart-count" class="text-lg font-medium text-gray-900">{{ cantidad() }}</div>
        </div>
        <div class="text-sm text-gray-600">
          <div class="text-xs text-gray-500">Total</div>
          <div id="cart-total" class="text-lg font-medium text-gray-900">${{ total() }}</div>
        </div>
      </div>
    </header>

    <main>
      <!-- Lista de productos -->
      <ul class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Producto (puedes duplicar/modificar) -->
        <li class="border rounded-lg p-4 flex flex-col">
          <div class="flex-1">
            <h2 class="text-md font-medium text-gray-800">Camiseta clásica</h2>
            <p class="text-sm text-gray-500">Algodón, talla M</p>
          </div>
          <div class="mt-4 flex items-center justify-between">
            <div class="text-lg font-semibold text-gray-900">$1500</div>
            <button
              (click)="sumarCarrito()"
              class="add-btn inline-flex items-center gap-2 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded"
              data-name="Camiseta clásica"
              data-price="19.99"
            >
              Añadir al carrito
            </button>
          </div>
        </li>
      </ul>
    </main>
  </div>
</div>
