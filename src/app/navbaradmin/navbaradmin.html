<aside class="bg-card border-r border-border flex flex-col w-64 h-screen p-6 shrink-0">
  <div class="flex items-center justify-between gap-2 mb-8 px-2">
    <span class="font-bold text-lg text-primary tracking-wider">TiendaAdmin</span>
    <button (click)="toggleMenu()" class="bg-card border border-border rounded-md p-1 cursor-pointer hover:bg-secondary hover:text-foreground">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
      </svg>
    </button>
  </div>
  
  <nav class="flex flex-col gap-1.5 flex-1">
    <a
      routerLink="/admin/dashboard"
      routerLinkActive="bg-primary/10 text-primary font-semibold"
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-secondary hover:text-foreground"
    >
      <span>Dashboard</span>
    </a>
    
    <!-- Aquí puedes añadir más enlaces en el futuro -->

    <a
      routerLink="/admin/productos"
      routerLinkActive="bg-primary/10 text-primary font-semibold"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-secondary hover:text-foreground"
    >
      <span>Productos</span>
    </a>
    -->
  </nav>

  <div class="border-t border-border pt-4">
    <a
      routerLink="/"
      class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-muted-foreground transition-colors hover:bg-secondary hover:text-foreground"
    >
      <span>← Volver a la Tienda</span>
    </a>
  </div>
</aside>
